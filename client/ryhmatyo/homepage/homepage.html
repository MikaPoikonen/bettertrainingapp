
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="layout">

    <div class="right">

      <header class="header">
        <img id="better_training_logo" src="../img/bettertrainngapplogo_nobackground.jpg" alt="Better Training Logo">
        <span class="app-name">Better Training App</span>
        <button>
            <img src="../img/transparent.png" alt="">
        </button>
      </header>

<!-- Homepage sisältö -->
    
<div class="dashboard-row">

  <!-- HRV kortti -->
  <div class="card hrv-card">
    <h3>HRV – Viimeiset 7 päivää</h3>
    <div id="hrvchart"></div>
  </div>

  <!-- READINESS ja Stressi kortti -->
  <div class="card readiness_stress-card">
    <div class="Stress-title">Stress</div>
    <div id="stressGauge"></div>
    <div class="readiness-status">
    <div class="readiness-title">Readiness</div>
    
    </div>
    <div id="readinessGauge"></div>
    <div class="physiological-title">Physiological</div>
    <div id="physiologicalGauge"></div>
  </div>
</div>


 <!-- Diary kortti -->
  
<div class="card diary-card">
  <div class="diary-header">
    <h3>Päiväkirja</h3>
    <button id="addDiaryBtn">+ Lisää uusi merkintä</button>
  </div>

  <div id="diaryEntries"></div>
</div>

<!-- Päiväkirja modaali ja uuden merkinnän lisäys -->
<dialog id="diaryDialog" class="app-dialog diary-dialog">
  <h3>Uusi päiväkirjamerkintä</h3>

  <form id="add-entry-form">
  <label> Päivämäärä
  <input type="date" name ="entry_date" required/>
  </label>

  <label> Mieliala (1-5)
  <input type="number" name="mood" min="1" max="5" required />
  </label>

  <label> Paino (kg)
  <input type="number" name="weight_now" step="0.1" min="0" required />
  </label>

  <label>Uni (h)
    <input type="number" name="sleep_hours" step="0.1" min="0" required />
  </label>

  <label> Muistiinpanot
  <textarea
    id="diaryText"
    placeholder="Miltä päivä tuntui?"
    rows="5"
    name="notes"
  ></textarea>
  </label>
  

  <div class="dialog-buttons">
    <button class="register_button" id="saveDiary">Tallenna</button>
    <button class="register_button" id="cancelDiary">Peruuta</button>
  </div>
</dialog>

      <footer class="footer">
        Footer
      </footer>

    </div>
  </div>
  <div id="dialogOverlay" class="dialog-overlay"></div>
</body>

<script type="module" src="homepage.js"></script>
<script type="module" src="/src/js/entrydialog.js"></script>
<script type="module" src="/src/js/register.js"></script>
</html>
``
